name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - "WithDayBack/**"
      - ".github/workflows/deploy-backend.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        working-directory: WithDayBack
        run: |
          set -e

          echo "Build Docker image"
          docker build -t withday-backend:${IMAGE_TAG} .

          echo "Save Docker image archive"
          docker save withday-backend:${IMAGE_TAG} -o /tmp/withday-backend-${IMAGE_TAG}.tar

          echo "Check image archive"
          ls -lh /tmp/withday-backend-${IMAGE_TAG}.tar

      - name: Prepare SSH key
        run: |
          set -e

          mkdir -p ~/.ssh

          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/withday-key.pem
          chmod 600 ~/.ssh/withday-key.pem

          echo "Check SSH key format"
          ssh-keygen -y -f ~/.ssh/withday-key.pem > /dev/null

          echo "Add EC2 host to known_hosts"
          ssh-keyscan -T 20 -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Create .env file
        run: |
          cat > /tmp/withday-backend.env << EOF
          SPRING_PROFILES_ACTIVE=prod
          SERVER_PORT=10400
          DB_URL=${{ secrets.DB_URL }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
          ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY=${{ secrets.ONESIGNAL_API_KEY }}
          EOF

      - name: Upload image archive to EC2
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=30 \
            -i ~/.ssh/withday-key.pem \
            /tmp/withday-backend-${IMAGE_TAG}.tar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/withday/withday-backend-${IMAGE_TAG}.tar

      - name: Upload .env to EC2
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=30 \
            -i ~/.ssh/withday-key.pem \
            /tmp/withday-backend.env \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/withday/.env

      - name: Upload docker-compose.yml to EC2
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=30 \
            -i ~/.ssh/withday-key.pem \
            WithDayBack/docker-compose.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/withday/docker-compose.yml

      - name: Deploy
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=30 \
            -i ~/.ssh/withday-key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e

            IMAGE_TAG="${IMAGE_TAG}"
            IMAGE_TAR="/home/ubuntu/withday/withday-backend-\${IMAGE_TAG}.tar"

            echo "========================================"
            echo "Load Docker image"
            echo "========================================"
            docker load -i "\${IMAGE_TAR}"

            echo "========================================"
            echo "Tag as latest"
            echo "========================================"
            docker tag withday-backend:\${IMAGE_TAG} withday-backend:latest

            echo "========================================"
            echo "Restart container"
            echo "========================================"
            cd /home/ubuntu/withday
            docker compose down
            docker compose up -d

            echo "========================================"
            echo "Clean up"
            echo "========================================"
            rm -f "\${IMAGE_TAR}"
            docker image prune -f

            echo "========================================"
            echo "Container status"
            echo "========================================"
            docker compose ps

            echo "========================================"
            echo "Health check"
            echo "========================================"
            sleep 10
            curl -i --max-time 30 http://localhost:8080/api/schedules || true

            echo "========================================"
            echo "Deploy finished"
            echo "========================================"
          EOF
